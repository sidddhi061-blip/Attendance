services:
  - type: web
    name: hrms-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://frontend-ashy-seven-32.vercel.app"
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: hrms-db
    plan: free
    region: singapore
